name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip
        run: unzip -q aura-athletics.zip -d src
      - name: Build
        run: |
          # 1. Делаем все найденные gradlew исполняемыми
          find src -name "gradlew" -exec chmod +x {} \;
          
          # 2. Ищем папку, где лежит build.gradle
          PROJECT_DIR=$(find src -name "build.gradle*" -exec dirname {} \; | head -n 1)
          echo "Собираем проект в: $PROJECT_DIR"
          
          # 3. Ищем, где лежит ближайший к проекту gradlew
          GRADLEW_PATH=$(find "$PROJECT_DIR" -maxdepth 2 -name "gradlew" | head -n 1)
          
          cd "$PROJECT_DIR"
          
          # 4. Запускаем сборку
          if [ -n "$GRADLEW_PATH" ]; then
            echo "Используем gradlew"
            ./gradlew assembleDebug
          else
            echo "gradlew не найден, пробуем глобальный gradle"
            gradle assembleDebug
          fi
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: src/**/build/outputs/apk/debug/*.apk
