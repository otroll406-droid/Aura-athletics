name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip project code
        run: unzip -q aura-athletics.zip -d src
      
      - name: Build with Gradle
        run: |
          # Находим папку с проектом
          PROJECT_DIR=$(find src -name "build.gradle*" -exec dirname {} \; | head -n 1)
          cd "$PROJECT_DIR"
          
          # Генерируем "пустой" ключ debug.keystore, чтобы Gradle перестал ругаться
          keytool -genkeypair -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 365 \
            -keystore debug.keystore -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
            
          # Собираем проект
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: src/**/build/outputs/apk/debug/*.apk
          
