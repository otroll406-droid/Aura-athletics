name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip project code
        run: unzip -q aura-athletics.zip -d src
      
      - name: Build with Gradle
        run: |
          # 1. Ищем папку, где лежит build.gradle
          PROJECT_DIR=$(find src -name "build.gradle*" -exec dirname {} \; | head -n 1)
          echo "Собираем проект в: $PROJECT_DIR"
          
          # 2. Ищем gradlew в этой папке
          GRADLEW_PATH=$(find "$PROJECT_DIR" -maxdepth 2 -name "gradlew" | head -n 1)
          
          # 3. Переходим в нужную папку
          cd "$PROJECT_DIR"
          
          # 4. Запускаем сборку (флаг -x validateSigningDebug пропускает проверку ключей)
          if [ -n "$GRADLEW_PATH" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug -x validateSigningDebug
          else
            gradle assembleDebug -x validateSigningDebug
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: src/**/build/outputs/apk/debug/*.apk
