name: Build Android APK from ZIP

on:
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project code
        run: |
          unzip aura-athletics.zip
          # Если код распаковался внутри подпапки, вытаскиваем его в корень
          if [ ! -f gradlew ]; then
            DIR=$(find . -maxdepth 2 -name gradlew -exec dirname {} \;)
            if [ -n "$DIR" ] && [ "$DIR" != "." ]; then
              cp -r "$DIR"/* .
            fi
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AuraAthletics-Debug-APK
          path: "**/build/outputs/apk/debug/app-debug.apk"
          
