name: Build Android APK
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip project code
        run: unzip -q aura-athletics.zip -d src
      
      - name: Build with Gradle
        run: |
          # Находим папку с проектом
          PROJECT_DIR=$(find src -name "build.gradle*" -exec dirname {} \; | head -n 1)
          cd "$PROJECT_DIR"
          
          # Устанавливаем права и собираем, пропуская все проверки подписи
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug -x signDebug -x validateSigningDebug
          else
            gradle assembleDebug -x signDebug -x validateSigningDebug
          fi
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: src/**/build/outputs/apk/debug/*.apk
